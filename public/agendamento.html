<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - AgendaPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fc;
            color: #1f2937;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            overflow-y: auto;
            transition: left 0.3s;
        }

        .logo-area {
            padding: 0 8px 24px 8px;
            border-bottom: 1px solid #f3f4f6;
            margin-bottom: 24px;
        }

        .logo-area h2 {
            font-size: 18px;
            font-weight: 700;
            color: #6366f1;
        }

        .logo-area p {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 4px;
        }

        .menu {
            flex: 1;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .menu-item:hover {
            background: #f3f4f6;
            color: #1f2937;
        }

        .menu-item.active {
            background: #eef2ff;
            color: #6366f1;
            font-weight: 600;
        }

        .menu-section {
            font-size: 11px;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            padding: 16px 12px 8px 12px;
        }

        .user-box {
            padding: 12px;
            background: #f9fafb;
            border-radius: 10px;
            margin-top: auto;
        }

        .user-box-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: #6366f1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        .user-info h4 {
            font-size: 13px;
            font-weight: 600;
        }

        .user-info p {
            font-size: 11px;
            color: #6b7280;
        }

        .btn-sair {
            width: 100%;
            padding: 8px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            cursor: pointer;
        }

        .btn-sair:hover {
            background: #f9fafb;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-menu {
            display: none;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
            color: #1f2937;
        }

        .topbar h1 {
            font-size: 20px;
            font-weight: 700;
        }

        .content-area {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .form-container {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #374151;
            font-size: 12px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #6366f1;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-confirmar {
            background: #10b981;
            color: white;
        }

        .btn-confirmar:hover {
            background: #059669;
        }

        .btn-cancelar {
            background: #ef4444;
            color: white;
        }

        .btn-cancelar:hover {
            background: #dc2626;
        }

        .btn-voltar {
            background: #6b7280;
            color: white;
            width: 100%;
            margin-top: 12px;
        }

        .btn-voltar:hover {
            background: #4b5563;
        }

        .mensagem {
            padding: 12px;
            margin-top: 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
        }

        .sucesso {
            background: #d1fae5;
            color: #065f46;
        }

        .erro {
            background: #fee2e2;
            color: #991b1b;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 998;
        }

        @media (max-width: 1024px) {
            .btn-menu {
                display: block;
            }

            .sidebar {
                position: fixed;
                left: -260px;
                top: 0;
                height: 100vh;
                z-index: 999;
            }

            .sidebar.show {
                left: 0;
            }

            .sidebar-overlay.show {
                display: block;
            }

            .content-area {
                padding: 16px;
            }

            .topbar {
                padding: 16px;
            }
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="logo-area">
            <h2>💈 AgendaPro</h2>
            <p id="nomeEstabelecimento">Sua Barbearia</p>
        </div>

        <nav class="menu">
            <a class="menu-item" onclick="location.href='dashboard-barbearia.html'">
                🏠 Dashboard
            </a>
            <a class="menu-item active">
                📅 Agenda
            </a>
            <a class="menu-item" onclick="location.href='clientes-barbearia.html'">
                👥 Clientes
            </a>
            <a class="menu-item" onclick="location.href='servicos-barbearia.html'">
                ✂️ Serviços
            </a>
            <a class="menu-item" onclick="location.href='despesas-barbearia.html'">
                💰 Financeiro
            </a>

            <div class="menu-section">Configurações</div>

            <a class="menu-item" onclick="location.href='meu-plano.html'">
                💎 Meu Plano
            </a>
            <a class="menu-item" onclick="alert('Em breve')">
                ⚙️ Estabelecimento
            </a>
            <a class="menu-item" onclick="alert('Em breve')">
                ❓ Central de Ajuda
            </a>
        </nav>

        <div class="user-box">
            <div class="user-box-top">
                <div class="user-avatar" id="userAvatar">A</div>
                <div class="user-info">
                    <h4 id="userName">Admin</h4>
                    <p id="userEmail">admin@barbearia.com</p>
                </div>
            </div>
            <button class="btn-sair" onclick="logout()">Sair</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="topbar">
            <button class="btn-menu" onclick="toggleSidebar()">☰</button>
            <h1 id="titulo">Novo Agendamento</h1>
        </div>

        <div class="content-area">
            <div class="form-container">
                <form id="agendaForm">
                    <input type="hidden" id="agendamentoId">

                    <div class="form-group">
                        <label>Nome do cliente *</label>
                        <input type="text" id="nome" placeholder="Digite o nome completo" required>
                    </div>

                    <div class="form-group">
                        <label>Telefone *</label>
                        <input type="tel" id="telefone" placeholder="(11) 99999-9999" required>
                    </div>

                    <div class="form-group">
                        <label>Serviço *</label>
                        <select id="servico" required></select>
                    </div>

                    <div class="form-group">
                        <label>Data *</label>
                        <input type="date" id="data" required>
                    </div>

                    <div class="form-group">
                        <label>Hora *</label>
                        <select id="hora" required></select>
                    </div>

                    <div class="form-group" id="statusGroup" style="display:none;">
                        <label>Status</label>
                        <select id="status">
                            <option value="agendado">Agendado</option>
                            <option value="concluido">Concluído</option>
                            <option value="cancelado">Cancelado</option>
                        </select>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn btn-confirmar" id="btnSalvar">✅ Confirmar</button>
                        <button type="button" id="btnCancelarAg" class="btn btn-cancelar" style="display:none;"
                            onclick="cancelarAgendamento()">🚫 Cancelar Agendamento</button>
                    </div>

                    <button type="button" class="btn btn-voltar" onclick="voltarPagina()">← Voltar</button>
                </form>
                <div id="mensagem"></div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = '/api';
        const barbearia = JSON.parse(localStorage.getItem('barbearia'));
        if (!barbearia) window.location.href = 'login-barbearia.html';

        document.getElementById('userName').textContent = barbearia.nome || 'Admin';
        document.getElementById('userEmail').textContent = barbearia.email;
        document.getElementById('userAvatar').textContent = (barbearia.nome || 'A')[0].toUpperCase();
        document.getElementById('nomeEstabelecimento').textContent = barbearia.nome || 'Sua Barbearia';

        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('id');
        const isEdicao = !!editId;

        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('show');
            let overlay = document.querySelector('.sidebar-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.className = 'sidebar-overlay';
                overlay.onclick = toggleSidebar;
                document.body.appendChild(overlay);
            }
            overlay.classList.toggle('show');
        }

        async function fetchAPI(endpoint, options = {}) {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${barbearia.token}`
                }
            });
            if (response.status === 401) window.location.href = 'login-barbearia.html';
            return response;
        }

        function logout() {
            localStorage.removeItem('barbearia');
            window.location.href = '/login-barbearia.html';
        }

        function gerarHorarios() {
            const horarios = [];
            for (let i = 9; i <= 19; i++) {
                horarios.push(`${i.toString().padStart(2, '0')}:00`);
                if (i !== 19) horarios.push(`${i.toString().padStart(2, '0')}:30`);
            }
            return horarios;
        }

        async function carregarServicos() {
            const response = await fetchAPI('/servicos');
            const servicos = await response.json();
            const select = document.getElementById('servico');
            select.innerHTML = '<option value="">Selecione...</option>';
            servicos.forEach(s => {
                const option = document.createElement('option');
                option.value = JSON.stringify({ nome: s.nome, preco: s.preco });
                option.textContent = `${s.nome} - R$ ${s.preco}`;
                select.appendChild(option);
            });
        }

        async function atualizarHorarios(horaAtual = null) {
            const data = document.getElementById('data').value;
            const selectHora = document.getElementById('hora');
            if (!data) return;

            const response = await fetchAPI(`/agendamentos`);
            const todosAg = await response.json();
            const ocupados = todosAg.filter(o => o.data === data && o.status !== 'cancelado' && o.id != editId);
            const todosHorarios = gerarHorarios();

            selectHora.innerHTML = '<option value="">Selecione...</option>';
            todosHorarios.forEach(horario => {
                const ocupado = ocupados.some(o => o.hora === horario);
                if (!ocupado || horario === horaAtual) {
                    const option = document.createElement('option');
                    option.value = horario;
                    option.textContent = horario;
                    if (horario === horaAtual) option.selected = true;
                    selectHora.appendChild(option);
                }
            });
        }

        async function carregarAgendamento() {
            if (!isEdicao) return;

            document.getElementById('titulo').textContent = 'Editar Agendamento';
            document.getElementById('btnSalvar').textContent = '💾 Salvar Alterações';
            document.getElementById('statusGroup').style.display = 'block';
            document.getElementById('btnCancelarAg').style.display = 'block';

            try {
                const response = await fetchAPI('/agendamentos');
                const agendamentos = await response.json();
                const ag = agendamentos.find(a => a.id == editId);

                if (!ag) {
                    alert('Agendamento não encontrado');
                    window.location.href = 'agendamentos.html';
                    return;
                }

                document.getElementById('agendamentoId').value = ag.id;
                document.getElementById('nome').value = ag.nome;
                document.getElementById('telefone').value = ag.telefone;
                document.getElementById('data').value = ag.data;
                document.getElementById('status').value = ag.status;

                await carregarServicos();
                const servicoSelect = document.getElementById('servico');
                Array.from(servicoSelect.options).forEach(opt => {
                    if (opt.value) {
                        const s = JSON.parse(opt.value);
                        if (s.nome === ag.servico && s.preco == ag.preco) {
                            opt.selected = true;
                        }
                    }
                });

                await atualizarHorarios(ag.hora);
            } catch (error) {
                alert('Erro ao carregar agendamento');
            }
        }

        async function cancelarAgendamento() {
            if (!confirm('Tem certeza que quer cancelar esse agendamento?')) return;

            try {
                const response = await fetchAPI(`/agendamentos/${editId}/cancelar`, {
                    method: 'PATCH'
                });

                if (response.ok) {
                    alert('Agendamento cancelado!');
                    window.location.href = 'agendamentos.html';
                } else {
                    const erro = await response.json();
                    alert(`Erro: ${erro.erro}`);
                }
            } catch (error) {
                alert('Erro ao cancelar');
            }
        }

        document.getElementById('agendaForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const servico = JSON.parse(document.getElementById('servico').value);
            const dados = {
                nome: document.getElementById('nome').value,
                telefone: document.getElementById('telefone').value,
                servico: servico.nome,
                preco: servico.preco,
                data: document.getElementById('data').value,
                hora: document.getElementById('hora').value
            };

            if (isEdicao) {
                dados.status = document.getElementById('status').value;
            }

            const url = isEdicao ? `/agendamentos/${editId}` : '/agendamentos';
            const method = isEdicao ? 'PUT' : 'POST';

            const response = await fetchAPI(url, { method, body: JSON.stringify(dados) });
            const resultado = await response.json();
            const msgDiv = document.getElementById('mensagem');

            if (response.ok) {
                msgDiv.innerHTML = `<div class="mensagem sucesso">${resultado.mensagem}</div>`;
                setTimeout(() => window.location.href = 'agendamentos.html', 1500);
            } else {
                msgDiv.innerHTML = `<div class="mensagem erro">${resultado.erro}</div>`;
                await atualizarHorarios();
            }
        });

        document.getElementById('data').addEventListener('change', () => atualizarHorarios());
        document.getElementById('data').min = new Date().toISOString().split('T')[0];

        carregarServicos().then(() => {
            if (isEdicao) {
                carregarAgendamento();
            } else {
                atualizarHorarios();
            }
        });

        function voltarPagina() {
            const urlParams = new URLSearchParams(window.location.search);
            const origem = urlParams.get('from');

            if (origem === 'dashboard') {
                window.location.href = 'dashboard-barbearia.html';
            } else {
                window.location.href = 'agendamentos.html';
            }
        }
    </script>
</body>

</html>
