<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - AgendaPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/base.css">
    <style>
        .form-container {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #374151;
            font-size: 12px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #6366f1;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }

        .btn-confirmar {
            background: #10b981;
            color: white;
        }

        .btn-confirmar:hover {
            background: #059669;
        }

        .btn-cancelar {
            background: #ef4444;
            color: white;
        }

        .btn-voltar {
            background: #6b7280;
            color: white;
            width: 100%;
            margin-top: 12px;
        }

        .mensagem {
            padding: 12px;
            margin-top: 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
        }

        .sucesso {
            background: #d1fae5;
            color: #065f46;
        }

        .erro {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="logo-area">
            <h2>💈 AgendaPro</h2>
            <p id="nomeEstabelecimento">Sua Barbearia</p>
        </div>
        <nav class="menu">
            <a class="menu-item" href="/dashboard-barbearia.html">🏠 Dashboard</a>
            <a class="menu-item active" href="/agendamentos.html">📅 Agenda</a>
            <a class="menu-item" href="/clientes-barbearia.html">👥 Clientes</a>
            <a class="menu-item" href="/servicos-barbearia.html">✂️ Serviços</a>
            <a class="menu-item" href="/despesas-barbearia.html">💰 Financeiro</a>
            <div class="menu-section">Configurações</div>
            <a class="menu-item" href="/meu-plano.html">💎 Meu Plano</a>
        </nav>
        <div class="user-box">
            <div class="user-box-top">
                <div class="user-avatar" id="userAvatar">A</div>
                <div class="user-info">
                    <h4 id="userName">Admin</h4>
                    <p id="userEmail">admin@barbearia.com</p>
                </div>
            </div>
            <button class="btn-sair" onclick="logout()">Sair</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="topbar">
            <button class="btn-menu" onclick="toggleSidebar()">☰</button>
            <h1 id="titulo">Novo Agendamento</h1>
        </div>

        <div class="content-area">
            <div class="form-container">
                <form id="agendaForm">
                    <input type="hidden" id="agendamentoId">
                    <div class="form-group">
                        <label>Nome do cliente *</label>
                        <input type="text" id="nome" placeholder="Digite o nome completo" required>
                    </div>
                    <div class="form-group">
                        <label>Telefone *</label>
                        <input type="tel" id="telefone" placeholder="(11) 99999-9999" required>
                    </div>
                    <div class="form-group">
                        <label>Serviço *</label>
                        <select id="servico" required></select>
                    </div>
                    <div class="form-group">
                        <label>Data *</label>
                        <input type="date" id="data" required>
                    </div>
                    <div class="form-group">
                        <label>Hora *</label>
                        <select id="hora" required></select>
                    </div>
                    <div class="form-group" id="statusGroup" style="display:none;">
                        <label>Status</label>
                        <select id="status">
                            <option value="agendado">Agendado</option>
                            <option value="concluido">Concluído</option>
                            <option value="cancelado">Cancelado</option>
                        </select>
                    </div>
                    <div class="actions">
                        <button type="submit" class="btn btn-confirmar" id="btnSalvar">✅ Confirmar</button>
                        <button type="button" id="btnCancelarAg" class="btn btn-cancelar" style="display:none;">🚫
                            Cancelar Agendamento</button>
                    </div>
                    <button type="button" class="btn btn-voltar" onclick="voltarPagina()">← Voltar</button>
                </form>
                <div id="mensagem"></div>
            </div>
        </div>
    </main>

    <script src="/js/core/auth.js"></script>
    <script src="/js/core/api.js"></script>
    <script src="/js/pages/agendamento.js"></script>
</body>

</html>
