<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Barbearia Estilo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            max-width: 450px;
            width: 100%;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            font-size: 3em;
            margin-bottom: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .mensagem {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            display: none;
            text-align: center;
        }

        .erro {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .aviso {
            background: #fff3cd;
            color: #856404;
            display: block;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">✂️</div>
        <h1>AgendaPro</h1>
        <p class="subtitle">Sistema de gestão completo</p>

        <form id="loginForm">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" required placeholder="contato@barbearia.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="senha" required placeholder="Sua senha">
            </div>
            <button type="submit">Entrar</button>
        </form>

        <div id="mensagem" class="mensagem"></div>

        <div class="register-link">
            Não tem cadastro? <a href="cadastro-barbearia.html">Cadastrar grátis por 14 dias</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            try {
                const response = await fetch(`${API_URL}/login-barbearia`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const resultado = await response.json();

                if (response.ok) {
                    // Salvar dados da barbearia
                    localStorage.setItem('barbearia', JSON.stringify({
                        id: resultado.id,
                        nome: resultado.nome,
                        email: resultado.email,
                        token: resultado.token,
                        plano: resultado.plano,
                        dias_restantes: resultado.dias_restantes
                    }));

                    // Redirecionar para o dashboard
                    window.location.href = 'dashboard-barbearia.html';
                } else {
                    const msgDiv = document.getElementById('mensagem');
                    msgDiv.textContent = resultado.erro;
                    msgDiv.className = 'mensagem erro';

                    if (resultado.expirado) {
                        msgDiv.className = 'mensagem aviso';
                        setTimeout(() => {
                            window.location.href = 'planos.html';
                        }, 2000);
                    }
                }
            } catch (error) {
                document.getElementById('mensagem').textContent = 'Erro ao conectar com o servidor';
                document.getElementById('mensagem').className = 'mensagem erro';
            }
        });
    </script>
</body>

</html>
