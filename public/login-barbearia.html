<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgendaPro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .erro {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🔐 Login - AgendaPro</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
        <div id="mensagem"></div>
        <p style="margin-top: 20px;"><a href="cadastro-barbearia.html">Não tem conta? Cadastre-se</a></p>
    </div>

    <script>
        const API_URL = '/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            try {
                const response = await fetch(`${API_URL}/login-barbearia`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const resultado = await response.json();

                if (response.ok) {
                    localStorage.setItem('barbearia', JSON.stringify({
                        id: resultado.id,
                        nome: resultado.nome,
                        email: resultado.email,
                        token: resultado.token
                    }));

                    // REDIRECIONAR PARA O DASHBOARD PRINCIPAL
                    window.location.href = 'dashboard-barbearia.html';
                } else {
                    document.getElementById('mensagem').innerHTML = `<p class="erro">${resultado.erro}</p>`;
                }
            } catch (error) {
                document.getElementById('mensagem').innerHTML = `<p class="erro">Erro ao conectar: ${error.message}</p>`;
            }
        });
    </script>
</body>

</html>
