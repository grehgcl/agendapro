<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Agendamento</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 20px;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        .btn-voltar {
            background: #6c757d;
        }

        .mensagem {
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }

        .sucesso {
            background: #d4edda;
            color: #155724;
        }

        .erro {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>✂️ Novo Agendamento</h2>
        <form id="agendaForm">
            <input type="text" id="nome" placeholder="Nome do cliente" required>
            <input type="tel" id="telefone" placeholder="Telefone" required>
            <select id="servico" required></select>
            <input type="date" id="data" required>
            <select id="hora" required></select>
            <button type="submit">✅ Confirmar Agendamento</button>
            <button type="button" class="btn-voltar" onclick="window.location.href='dashboard-barbearia.html'">←
                Voltar</button>
        </form>
        <div id="mensagem"></div>
    </div>

    <script>
        const API_URL = '/api';
        const barbearia = JSON.parse(localStorage.getItem('barbearia'));
        if (!barbearia) window.location.href = 'login-barbearia.html';

        async function fetchAPI(endpoint, options = {}) {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'barbearia-id': barbearia.id,
                    'Authorization': barbearia.token
                }
            });
            if (response.status === 401) window.location.href = 'login-barbearia.html';
            return response;
        }

        function gerarHorarios() {
            const horarios = [];
            for (let i = 9; i <= 19; i++) {
                horarios.push(`${i}:00`);
                if (i !== 19) horarios.push(`${i}:30`);
            }
            return horarios;
        }

        async function carregarServicos() {
            const response = await fetchAPI('/servicos');
            const servicos = await response.json();
            const select = document.getElementById('servico');
            select.innerHTML = '<option value="">Selecione...</option>';
            servicos.forEach(s => {
                const option = document.createElement('option');
                option.value = JSON.stringify({ nome: s.nome, preco: s.preco });
                option.textContent = `${s.nome} - R$ ${s.preco}`;
                select.appendChild(option);
            });
        }

        async function atualizarHorarios() {
            const data = document.getElementById('data').value;
            const selectHora = document.getElementById('hora');
            if (!data) return;

            const response = await fetchAPI(`/agendamentos?data=${data}`);
            const ocupados = await response.json();
            const todosHorarios = gerarHorarios();

            selectHora.innerHTML = '<option value="">Selecione...</option>';
            todosHorarios.forEach(horario => {
                if (!ocupados.some(o => o.hora === horario)) {
                    const option = document.createElement('option');
                    option.value = horario;
                    option.textContent = horario;
                    selectHora.appendChild(option);
                }
            });
        }

        document.getElementById('agendaForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const servico = JSON.parse(document.getElementById('servico').value);
            const dados = {
                nome: document.getElementById('nome').value,
                telefone: document.getElementById('telefone').value,
                servico: servico.nome,
                preco: servico.preco,
                data: document.getElementById('data').value,
                hora: document.getElementById('hora').value
            };

            const response = await fetchAPI('/agendamentos', { method: 'POST', body: JSON.stringify(dados) });
            const resultado = await response.json();
            const msgDiv = document.getElementById('mensagem');

            if (response.ok) {
                msgDiv.innerHTML = `<div class="mensagem sucesso">${resultado.mensagem}</div>`;
                setTimeout(() => window.location.href = 'dashboard-barbearia.html', 1500);
            } else {
                msgDiv.innerHTML = `<div class="mensagem erro">${resultado.erro}</div>`;
                await atualizarHorarios();
            }
        });

        document.getElementById('data').addEventListener('change', atualizarHorarios);
        document.getElementById('data').min = new Date().toISOString().split('T')[0];

        carregarServicos();
    </script>
</body>

</html>
