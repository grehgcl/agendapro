<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Teste Final</title>
</head>

<body>
    <h1>Lista de Agendamentos</h1>
    <div id="resultado"></div>

    <script>
        const barbearia = JSON.parse(localStorage.getItem('barbearia'));

        if (!barbearia) {
            document.getElementById('resultado').innerHTML = 'Faça login primeiro';
        } else {
            fetch('/api/agendamentos', {
                headers: {
                    'barbearia-id': barbearia.id,
                    'Authorization': barbearia.token
                }
            })
                .then(res => res.json())
                .then(data => {
                    if (data.length === 0) {
                        document.getElementById('resultado').innerHTML = 'Nenhum agendamento encontrado';
                    } else {
                        let html = '<ul>';
                        data.forEach(ag => {
                            html += `<li>${ag.data} ${ag.hora} - ${ag.nome} - ${ag.servico}</li>`;
                        });
                        html += '</ul>';
                        document.getElementById('resultado').innerHTML = html;
                    }
                })
                .catch(err => {
                    document.getElementById('resultado').innerHTML = 'Erro: ' + err.message;
                });
        }
    </script>
</body>

</html>
