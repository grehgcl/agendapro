<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despesas - AgendaPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-voltar {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #ef4444;
        }

        .btn-novo {
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .filtros {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filtros input,
        .filtros select {
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
        }

        table {
            width: 100%;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background: #f8fafc;
            font-weight: 600;
        }

        .btn-editar,
        .btn-excluir {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
        }

        .btn-editar {
            color: #3b82f6;
        }

        .btn-excluir {
            color: #ef4444;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            overflow: hidden;
        }

        .modal-header {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            padding: 20px;
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            padding: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .btn-salvar {
            flex: 1;
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-cancelar {
            flex: 1;
            background: #64748b;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 1100;
        }

        .categoria-badge {
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        @media (max-width: 768px) {

            th,
            td {
                font-size: 12px;
                padding: 8px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>💰 Despesas</h1>
            <button class="btn-voltar" onclick="window.location.href='dashboard-barbearia.html'">← Voltar</button>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div>💰 Total Despesas</div>
                <div class="stat-value" id="totalDespesas">R$ 0</div>
            </div>
            <div class="stat-card">
                <div>📊 Média Mensal</div>
                <div class="stat-value" id="mediaDespesas">R$ 0</div>
            </div>
        </div>

        <div class="filtros">
            <input type="month" id="mesFiltro">
            <button class="btn-novo" onclick="abrirModalNovo()">➕ Nova Despesa</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Descrição</th>
                    <th>Categoria</th>
                    <th>Valor</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaDespesas"></tbody>
        </table>
    </div>

    <!-- Modal -->
    <div id="despesaModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">💰 Nova Despesa</h3>
            </div>
            <div class="modal-body">
                <div class="form-group"><label>Descrição</label><input type="text" id="descricao"
                        placeholder="Ex: Aluguel, Luz, Salário..."></div>
                <div class="form-group"><label>Valor (R$)</label><input type="number" id="valor" step="0.01"
                        placeholder="0,00"></div>
                <div class="form-group"><label>Categoria</label>
                    <select id="categoria">
                        <option value="aluguel">🏢 Aluguel</option>
                        <option value="agua">💧 Água</option>
                        <option value="luz">⚡ Luz</option>
                        <option value="internet">🌐 Internet</option>
                        <option value="salario">👥 Salários</option>
                        <option value="produtos">📦 Produtos</option>
                        <option value="manutencao">🔧 Manutenção</option>
                        <option value="impostos">📋 Impostos</option>
                        <option value="outros">📌 Outros</option>
                    </select>
                </div>
                <div class="form-group"><label>Data</label><input type="date" id="data"></div>
                <div class="form-group"><label>Status</label>
                    <select id="pagamento">
                        <option value="pago">✅ Pago</option>
                        <option value="pendente">⏳ Pendente</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button class="btn-salvar" onclick="salvarDespesa()">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const barbearia = JSON.parse(localStorage.getItem('barbearia'));

        if (!barbearia) window.location.href = '/';

        let despesas = [];
        let despesaEditandoId = null;

        async function fetchAPI(endpoint, options = {}) {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'barbearia-id': barbearia.id,
                    'authorization': barbearia.token,
                    ...options.headers
                }
            });
            return response;
        }

        async function carregarDespesas() {
            const mes = document.getElementById('mesFiltro').value;
            let url = '/api/despesas';
            if (mes) {
                const [ano, mesNum] = mes.split('-');
                url += `?data_inicio=${ano}-${mesNum}-01&data_fim=${ano}-${mesNum}-31`;
            }

            const response = await fetchAPI(url);
            despesas = await response.json();
            exibirDespesas();
            calcularStats();
        }

        function exibirDespesas() {
            const tbody = document.getElementById('tabelaDespesas');
            tbody.innerHTML = despesas.map(d => `
                <tr>
                    <td>${formatarData(d.data)}</td>
                    <td>${d.descricao}</td>
                    <td><span class="categoria-badge">${getCategoriaNome(d.categoria)}</span></td>
                    <td style="color: #ef4444; font-weight: 600;">R$ ${parseFloat(d.valor).toFixed(2)}</td>
                    <td>${d.pagamento === 'pago' ? '✅ Pago' : '⏳ Pendente'}</td>
                    <td>
                        <button class="btn-editar" onclick="abrirModalEditar(${d.id})">✏️</button>
                        <button class="btn-excluir" onclick="excluirDespesa(${d.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function calcularStats() {
            const total = despesas.reduce((sum, d) => sum + parseFloat(d.valor), 0);
            document.getElementById('totalDespesas').textContent = `R$ ${total.toFixed(2)}`;

            if (despesas.length > 0) {
                const media = total / despesas.length;
                document.getElementById('mediaDespesas').textContent = `R$ ${media.toFixed(2)}`;
            }
        }

        function formatarData(dataStr) {
            const data = new Date(dataStr);
            return data.toLocaleDateString('pt-BR');
        }

        function getCategoriaNome(cat) {
            const categorias = {
                aluguel: '🏢 Aluguel', agua: '💧 Água', luz: '⚡ Luz',
                internet: '🌐 Internet', salario: '👥 Salários', produtos: '📦 Produtos',
                manutencao: '🔧 Manutenção', impostos: '📋 Impostos', outros: '📌 Outros'
            };
            return categorias[cat] || cat;
        }

        function abrirModalNovo() {
            despesaEditandoId = null;
            document.getElementById('modalTitle').textContent = '💰 Nova Despesa';
            document.getElementById('descricao').value = '';
            document.getElementById('valor').value = '';
            document.getElementById('categoria').value = 'outros';
            document.getElementById('data').value = new Date().toISOString().split('T')[0];
            document.getElementById('pagamento').value = 'pago';
            document.getElementById('despesaModal').classList.add('show');
        }

        async function abrirModalEditar(id) {
            const despesa = despesas.find(d => d.id === id);
            if (despesa) {
                despesaEditandoId = id;
                document.getElementById('modalTitle').textContent = '✏️ Editar Despesa';
                document.getElementById('descricao').value = despesa.descricao;
                document.getElementById('valor').value = despesa.valor;
                document.getElementById('categoria').value = despesa.categoria;
                document.getElementById('data').value = despesa.data;
                document.getElementById('pagamento').value = despesa.pagamento;
                document.getElementById('despesaModal').classList.add('show');
            }
        }

        async function salvarDespesa() {
            const dados = {
                descricao: document.getElementById('descricao').value,
                valor: parseFloat(document.getElementById('valor').value),
                categoria: document.getElementById('categoria').value,
                data: document.getElementById('data').value,
                pagamento: document.getElementById('pagamento').value
            };

            if (!dados.descricao || !dados.valor || !dados.data) {
                alert('Preencha descrição, valor e data!');
                return;
            }

            let response;
            if (despesaEditandoId) {
                response = await fetchAPI(`/api/despesas/${despesaEditandoId}`, {
                    method: 'PUT',
                    body: JSON.stringify(dados)
                });
            } else {
                response = await fetchAPI('/api/despesas', {
                    method: 'POST',
                    body: JSON.stringify(dados)
                });
            }

            if (response.ok) {
                mostrarToast(despesaEditandoId ? '✅ Despesa atualizada!' : '✅ Despesa registrada!');
                fecharModal();
                carregarDespesas();
            } else {
                const erro = await response.json();
                alert(erro.erro || 'Erro ao salvar');
            }
        }

        async function excluirDespesa(id) {
            if (confirm('Tem certeza que deseja excluir esta despesa?')) {
                const response = await fetchAPI(`/api/despesas/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    mostrarToast('✅ Despesa excluída!');
                    carregarDespesas();
                }
            }
        }

        function fecharModal() {
            document.getElementById('despesaModal').classList.remove('show');
        }

        function mostrarToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        document.getElementById('mesFiltro').value = new Date().toISOString().slice(0, 7);
        document.getElementById('mesFiltro').addEventListener('change', () => carregarDespesas());

        carregarDespesas();

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // ISSO É OBRIGATÓRIO

            const res = await fetch('/api/despesas', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                },
                body: JSON.stringify({
                    descricao: document.getElementById('descricao').value,
                    valor: parseFloat(document.getElementById('valor').value),
                    categoria: document.getElementById('categoria').value,
                    data: document.getElementById('data').value,
                    pagamento: document.getElementById('pagamento').value,
                    observacao: document.getElementById('observacao').value
                })
            });

            const data = await res.json();
            if (res.ok) {
                alert('Despesa salva!');
                form.reset();
            } else {
                alert('Erro: ' + data.erro);
            }
        });
    </script>
</body>

</html>
