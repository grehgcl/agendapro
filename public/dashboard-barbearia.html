<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AgendaPro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .card .valor {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .acoes {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-info {
            background: #17a2b8;
            color: white;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .semana-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .dia-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .dia-header {
            background: #667eea;
            color: white;
            padding: 10px;
            text-align: center;
        }

        .dia-header.today {
            background: #e74c3c;
        }

        .agendamentos-lista {
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .agendamento-item {
            background: #f8f9fa;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .agendamento-hora {
            font-weight: bold;
            color: #667eea;
        }

        .sem-agendamentos {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        .btn-sair {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h2>📋 AgendaPro</h2>
                <p>Sistema de Gestão</p>
            </div>
            <div>
                <span id="userName"></span>
                <button class="btn-sair" onclick="logout()">Sair</button>
            </div>
        </div>
    </div>

    <div class="cards">
        <div class="card">
            <h3>💰 HOJE</h3>
            <div class="valor" id="faturamentoDia">R$ 0</div>
        </div>
        <div class="card">
            <h3>📊 SEMANA</h3>
            <div class="valor" id="faturamentoSemana">R$ 0</div>
        </div>
        <div class="card">
            <h3>📅 TOTAL</h3>
            <div class="valor" id="totalAgendamentos">0</div>
        </div>
    </div>

    <div class="acoes">
        <button class="btn btn-primary" onclick="window.location.href='agenda-barbearia.html'">➕ Novo
            Agendamento</button>
        <button class="btn btn-info" onclick="window.location.href='clientes-barbearia.html'">👥 Clientes</button>
        <button class="btn btn-success" onclick="carregarDashboard()">🔄 Atualizar</button>
    </div>

    <h3>📅 Agendamentos da Semana</h3>
    <div id="agendaContent"></div>

    <script>
        const API_URL = '/api';
        const barbearia = JSON.parse(localStorage.getItem('barbearia'));

        if (!barbearia) window.location.href = 'login-barbearia.html';

        document.getElementById('userName').innerHTML = barbearia.nome;

        async function fetchAPI(endpoint, options = {}) {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'barbearia-id': barbearia.id,
                    'Authorization': barbearia.token,
                    ...options.headers
                }
            });
            if (response.status === 401) window.location.href = 'login-barbearia.html';
            return response;
        }

        async function carregarDashboard() {
            try {
                const response = await fetchAPI('/dashboard');
                const dados = await response.json();

                document.getElementById('faturamentoDia').innerHTML = `R$ ${dados.faturamento.dia.toFixed(2)}`;
                document.getElementById('faturamentoSemana').innerHTML = `R$ ${dados.faturamento.semana.toFixed(2)}`;
                document.getElementById('totalAgendamentos').innerHTML = dados.totalAgendamentos;

                const hoje = new Date().toISOString().split('T')[0];
                let html = '<div class="semana-grid">';

                for (const data of dados.semana) {
                    const agendamentos = dados.agendamentos[data] || [];
                    const [ano, mes, dia] = data.split('-');
                    const dias = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
                    const dataObj = new Date(ano, mes - 1, dia);
                    const nomeDia = dias[dataObj.getDay()];
                    const isHoje = data === hoje;

                    html += `
                        <div class="dia-card">
                            <div class="dia-header ${isHoje ? 'today' : ''}">
                                <strong>${nomeDia}, ${dia}/${mes}</strong>
                                <div style="font-size: 12px;">${agendamentos.length} agendamento(s)</div>
                            </div>
                            <div class="agendamentos-lista">
                    `;

                    if (agendamentos.length === 0) {
                        html += '<div class="sem-agendamentos">📅 Nenhum agendamento</div>';
                    } else {
                        agendamentos.forEach(ag => {
                            html += `
                                <div class="agendamento-item">
                                    <div class="agendamento-hora">🕐 ${ag.hora}</div>
                                    <div><strong>${ag.nome}</strong></div>
                                    <div>✂️ ${ag.servico} - R$ ${ag.preco}</div>
                                    <button onclick="excluirAgendamento(${ag.id})" style="margin-top:5px; padding:5px; background:#dc3545; color:white; border:none; border-radius:5px; cursor:pointer;">Cancelar</button>
                                </div>
                            `;
                        });
                    }
                    html += `</div></div>`;
                }
                html += '</div>';
                document.getElementById('agendaContent').innerHTML = html;
            } catch (error) {
                document.getElementById('agendaContent').innerHTML = `<p style="color:red">Erro: ${error.message}</p>`;
            }
        }

        async function excluirAgendamento(id) {
            if (confirm('Cancelar este agendamento?')) {
                await fetchAPI(`/agendamentos/${id}`, { method: 'DELETE' });
                carregarDashboard();
            }
        }

        function logout() {
            localStorage.removeItem('barbearia');
            window.location.href = 'login-barbearia.html';
        }

        carregarDashboard();
        setInterval(carregarDashboard, 30000);
    </script>
</body>

</html>
