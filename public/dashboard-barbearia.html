<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AgendaPro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .card .valor {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .acoes {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-info {
            background: #17a2b8;
            color: white;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .semana-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .dia-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .dia-header {
            background: #667eea;
            color: white;
            padding: 10px;
            text-align: center;
        }

        .dia-header.today {
            background: #e74c3c;
        }

        .agendamentos-lista {
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .agendamento-item {
            background: #f8f9fa;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .agendamento-hora {
            font-weight: bold;
            color: #667eea;
            font-size: 14px;
        }

        .agendamento-nome {
            font-weight: bold;
            margin: 5px 0;
        }

        .agendamento-servico {
            color: #666;
            font-size: 13px;
        }

        .agendamento-telefone {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }

        .sem-agendamentos {
            text-align: center;
            color: #999;
            padding: 30px;
        }

        .btn-sair {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        .btn-cancelar {
            margin-top: 8px;
            padding: 5px 10px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-cancelar:hover {
            background: #c82333;
        }
    </style>
</head>

<body>
    <div class="header">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <div>
                <h2>📋 AgendaPro</h2>
                <p>Sistema de Gestão</p>
            </div>
            <div>
                <span id="userName" style="margin-right: 15px;"></span>
                <button class="btn-sair" onclick="logout()">Sair</button>
            </div>
        </div>
    </div>

    <div class="cards">
        <div class="card">
            <h3>💰 HOJE</h3>
            <div class="valor" id="faturamentoDia">R$ 0</div>
        </div>
        <div class="card">
            <h3>📊 SEMANA</h3>
            <div class="valor" id="faturamentoSemana">R$ 0</div>
        </div>
        <div class="card">
            <h3>📅 TOTAL</h3>
            <div class="valor" id="totalAgendamentos">0</div>
        </div>
    </div>

    <div class="acoes">
        <button class="btn btn-primary" onclick="window.location.href='agenda-barbearia.html'">➕ Novo
            Agendamento</button>
        <button class="btn btn-info" onclick="window.location.href='clientes-barbearia.html'">👥 Clientes</button>
        <button class="btn btn-success" onclick="carregarDashboard()">🔄 Atualizar</button>
    </div>

    <h3 style="margin-bottom: 15px;">📅 Agendamentos da Semana</h3>
    <div id="agendaContent">Carregando...</div>

    <script>
        const barbearia = JSON.parse(localStorage.getItem('barbearia'));

        if (!barbearia) {
            window.location.href = 'login-barbearia.html';
        }

        document.getElementById('userName').innerHTML = barbearia.nome;

        async function carregarDashboard() {
            try {
                const response = await fetch('/api/agendamentos', {
                    headers: {
                        'barbearia-id': barbearia.id,
                        'Authorization': barbearia.token
                    }
                });

                const agendamentos = await response.json();
                console.log('Agendamentos:', agendamentos);

                // Calcular totais
                const hoje = new Date().toISOString().split('T')[0];
                const agendamentosHoje = agendamentos.filter(a => a.data === hoje);
                const totalHoje = agendamentosHoje.reduce((s, a) => s + a.preco, 0);
                const totalSemana = agendamentos.reduce((s, a) => s + a.preco, 0);

                document.getElementById('faturamentoDia').innerHTML = `R$ ${totalHoje.toFixed(2)}`;
                document.getElementById('faturamentoSemana').innerHTML = `R$ ${totalSemana.toFixed(2)}`;
                document.getElementById('totalAgendamentos').innerHTML = agendamentos.length;

                // Gerar próximos 7 dias
                const semana = [];
                for (let i = 0; i < 7; i++) {
                    const data = new Date();
                    data.setDate(data.getDate() + i);
                    semana.push(data.toISOString().split('T')[0]);
                }

                // Montar grid
                let html = '<div class="semana-grid">';

                for (const data of semana) {
                    const lista = agendamentos.filter(a => a.data === data);
                    const [ano, mes, dia] = data.split('-');
                    const dias = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
                    const meses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
                    const dataObj = new Date(ano, mes - 1, dia);
                    const nomeDia = dias[dataObj.getDay()];
                    const nomeMes = meses[parseInt(mes) - 1];
                    const isHoje = data === hoje;

                    html += `
                        <div class="dia-card">
                            <div class="dia-header ${isHoje ? 'today' : ''}">
                                <strong>${nomeDia}, ${parseInt(dia)} ${nomeMes}</strong>
                                <div style="font-size: 11px; margin-top: 3px;">${data}</div>
                                <div style="font-size: 11px; margin-top: 3px;">${lista.length} agendamento(s)</div>
                            </div>
                            <div class="agendamentos-lista">
                    `;

                    if (lista.length === 0) {
                        html += '<div class="sem-agendamentos">📅 Nenhum agendamento</div>';
                    } else {
                        lista.forEach(ag => {
                            html += `
                                <div class="agendamento-item">
                                    <div class="agendamento-hora">🕐 ${ag.hora}</div>
                                    <div class="agendamento-nome">👤 ${ag.nome}</div>
                                    <div class="agendamento-servico">✂️ ${ag.servico} - R$ ${ag.preco}</div>
                                    ${ag.telefone ? `<div class="agendamento-telefone">📞 ${ag.telefone}</div>` : ''}
                                    <button class="btn-cancelar" onclick="excluirAgendamento(${ag.id})">Cancelar</button>
                                </div>
                            `;
                        });
                    }
                    html += `</div></div>`;
                }
                html += '</div>';
                document.getElementById('agendaContent').innerHTML = html;

            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('agendaContent').innerHTML = `<p style="color:red">Erro ao carregar: ${error.message}</p>`;
            }
        }

        async function excluirAgendamento(id) {
            if (confirm('Cancelar este agendamento?')) {
                const response = await fetch(`/api/agendamentos/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'barbearia-id': barbearia.id,
                        'Authorization': barbearia.token
                    }
                });
                if (response.ok) {
                    carregarDashboard();
                } else {
                    alert('Erro ao cancelar');
                }
            }
        }

        function logout() {
            localStorage.removeItem('barbearia');
            window.location.href = 'login-barbearia.html';
        }

        carregarDashboard();
        setInterval(carregarDashboard, 30000);
    </script>
</body>

</html>
