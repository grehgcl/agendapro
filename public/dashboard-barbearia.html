<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgendaPro - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>
    </main>

    <script src="/js/core/auth.js"></script>
    <script src="/js/core/api.js"></script>
    <script src="/js/components/sidebar.js"></script>
    <script>
        renderSidebar('dashboard');
    </script>
    <script src="/js/pages/dashboard.js"></script>
</body>

</html>
<main class="main-content">
    <div class="topbar">
        <div class="topbar-left">
            <button class="btn-menu" onclick="toggleSidebar()">☰</button>
            <h1 id="pageTitle">Dashboard</h1>
        </div>
        <div class="topbar-actions">
            <button class="btn-primary" onclick="window.location.href='agendamento.html?from=dashboard'">
                + Novo Agendamento
            </button>
        </div>
    </div>

    <div class="content-area">
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Agendamentos Hoje</div>
                <div class="stat-value" id="agendamentosHoje">0</div>
                <div class="stat-change up" id="agendamentosSub">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Faturamento Hoje</div>
                <div class="stat-value" id="faturamentoHoje">R$ 0</div>
                <div class="stat-change up">+12% vs ontem</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Clientes do Mês</div>
                <div class="stat-value" id="clientesMes">0</div>
                <div class="stat-change up">+8 novos</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Ticket Médio</div>
                <div class="stat-value" id="ticketMedio">R$ 0</div>
                <div class="stat-change">-</div>
            </div>
        </div>

        <div class="calendar-wrapper">
            <div class="calendar-header" id="calendarHeader">
                <div class="calendar-header-cell"></div>
            </div>
            <div class="calendar-body" id="calendarBody">
                <div class="time-column" id="timeColumn"></div>
            </div>
        </div>
    </div>
</main>

</main>

<script src="/js/core/auth.js"></script>
<script src="/js/core/api.js"></script>
<script src="/js/pages/dashboard.js"></script>
</body>

</html>
</body>

</html>
