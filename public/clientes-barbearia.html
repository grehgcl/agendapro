<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - AgendaPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/tabela.css">
</head>

<body>
    <aside class="sidebar">
        <div class="logo-area">
            <h2>AgendaPro</h2>
            <p id="nomeEstabelecimento">Sua Barbearia</p>
        </div>

        <nav class="menu">
            <div class="menu-section">Principal</div>
            <a href="/dashboard-barbearia.html" class="menu-item">
                📊 Dashboard
            </a>
            <a href="/agendamentos.html" class="menu-item">
                📅 Agenda
            </a>
            <a href="/servicos-barbearia.html" class="menu-item">
                ✂️ Serviços
            </a>
            <a href="/clientes-barbearia.html" class="menu-item active">
                👥 Clientes
            </a>

            <div class="menu-section">Financeiro</div>
            <a href="/despesas-barbearia.html" class="menu-item">
                💰 Despesas
            </a>

            <div class="menu-section">Configurações</div>
            <a href="/meu-plano.html" class="menu-item">
                💎 Meu Plano
            </a>
            <a href="#" class="menu-item">
                ⚙️ Estabelecimento
            </a>
            <a href="#" class="menu-item">
                ❓ Central de Ajuda
            </a>
        </nav>

        <div class="user-box">
            <div class="user-box-top">
                <div class="user-avatar" id="userAvatar">A</div>
                <div class="user-info">
                    <h4 id="userNome">Admin</h4>
                    <p id="userEmail">admin@barbearia.com</p>
                </div>
            </div>
            <button class="btn-sair" onclick="logout()">Sair</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="topbar">
            <div class="topbar-left">
                <button class="btn-menu" onclick="toggleSidebar()">☰</button>
                <h1>Meus Clientes</h1>
            </div>
            <div class="topbar-actions">
                <button class="btn-primary" id="btnNovoCliente">
                    + Novo Cliente
                </button>
            </div>
        </div>

        <div class="content-area">
            <div class="top-bar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Buscar por nome, email ou telefone...">
                </div>
            </div>

            <div class="stats" id="stats">
                <div class="total" id="totalClientes">0</div>
                <div class="label">clientes cadastrados</div>
            </div>

            <div class="table-container">
                <table id="tabelaClientes">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>E-mail</th>
                            <th>Telefone</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaClientes">
                        <tr>
                            <td colspan="4" style="text-align: center; color: #9ca3af;">Carregando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Cliente -->
    <div id="modalCliente" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">➕ Novo Cliente</h3>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Nome completo *</label>
                    <input type="text" id="clienteNome" placeholder="Digite o nome completo">
                </div>
                <div class="form-group">
                    <label>E-mail *</label>
                    <input type="email" id="clienteEmail" placeholder="cliente@email.com">
                </div>
                <div class="form-group">
                    <label>Telefone/WhatsApp</label>
                    <input type="tel" id="clienteTelefone" placeholder="(11) 99999-9999">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button class="btn-salvar" onclick="salvarCliente()">Salvar</button>
            </div>
        </div>
    </div>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <script src="/js/core/auth.js"></script>
    <script src="/js/core/api.js"></script>
    <script src="/js/pages/clientes.js"></script>
</body>

</html>
