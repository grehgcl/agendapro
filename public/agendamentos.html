<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamentos - AgendaPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fc;
            color: #1f2937;
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
        }

        .logo-area {
            padding: 0 8px 24px 8px;
            border-bottom: 1px solid #f3f4f6;
            margin-bottom: 24px;
        }

        .logo-area h2 {
            font-size: 18px;
            font-weight: 700;
            color: #6366f1;
        }

        .menu {
            flex: 1;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .menu-item.active {
            background: #eef2ff;
            color: #6366f1;
            font-weight: 600;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar h1 {
            font-size: 20px;
            font-weight: 700;
        }

        .btn-primary {
            background: #6366f1;
            color: white;
            border: none;
            padding: 9px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .content-area {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
        }

        .table-container {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #f3f4f6;
            font-size: 13px;
        }

        th {
            background: #f9fafb;
            font-weight: 600;
            color: #6b7280;
            font-size: 11px;
            text-transform: uppercase;
        }

        .status {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }

        .status-agendado {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-concluido {
            background: #d1fae5;
            color: #065f46;
        }

        .status-cancelado {
            background: #fee2e2;
            color: #991b1b;
        }

        .btn {
            padding: 5px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 2px;
            font-size: 11px;
            font-weight: 600;
        }

        .btn-edit {
            background: #3b82f6;
            color: white;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="logo-area">
            <h2>💈 AgendaPro</h2>
        </div>
        <nav class="menu">
            <a class="menu-item" onclick="location.href='dashboard-barbearia.html'">🏠 Dashboard</a>
            <a class="menu-item active">📅 Agenda</a>
            <a class="menu-item" onclick="location.href='clientes-barbearia.html'">👥 Clientes</a>
            <a class="menu-item" onclick="location.href='servicos-barbearia.html'">✂️ Serviços</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="topbar">
            <h1>Agendamentos</h1>
            <button class="btn-primary" onclick="location.href='agendamento.html'">+ Novo Agendamento</button>
        </div>

        <div class="content-area">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Serviço</th>
                            <th>Data</th>
                            <th>Hora</th>
                            <th>Valor</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaAgendamentos">
                        <tr>
                            <td colspan="7" style="text-align: center;">Carregando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:3000/api';
        const barbearia = JSON.parse(localStorage.getItem('barbearia') || '{}');

        if (!barbearia.id) {
            alert('Faça login primeiro');
            window.location.href = 'login-barbearia.html';
        }

        async function carregar() {
            console.log('Carregando agendamentos...');
            try {
                const res = await fetch(`${API_URL}/agendamentos`, {
                    headers: {
                        'Content-Type': 'application/json',
                        'barbearia-id': barbearia.id,
                        'Authorization': barbearia.token
                    }
                });

                console.log('Status:', res.status);
                const dados = await res.json();
                console.log('Dados:', dados);

                const lista = Array.isArray(dados) ? dados : (dados.agendamentos || []);
                const tbody = document.getElementById('listaAgendamentos');

                if (lista.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">Nenhum agendamento</td></tr>';
                    return;
                }

                tbody.innerHTML = lista.map(a => `
                    <tr>
                        <td>${a.nome || '-'}</td>
                        <td>${a.servico || '-'}</td>
                        <td>${a.data ? a.data.split('-').reverse().join('/') : '-'}</td>
                        <td>${a.hora || '-'}</td>
                        <td>R$ ${(parseFloat(a.preco) || 0).toFixed(2)}</td>
                        <td><span class="status status-${a.status}">${a.status}</span></td>
                        <td>
                            <button class="btn btn-edit" onclick="editar(${a.id})">Editar</button>
                            <button class="btn btn-delete" onclick="deletar(${a.id})">Deletar</button>
                        </td>
                    </tr>
                `).join('');

            } catch (err) {
                console.error('Erro:', err);
                document.getElementById('listaAgendamentos').innerHTML =
                    `<tr><td colspan="7" style="text-align: center; color: red;">Erro: ${err.message}</td></tr>`;
            }
        }

        function editar(id) {
            location.href = `agendamento.html?id=${id}`;
        }

        async function deletar(id) {
            if (!confirm('Deletar?')) return;
            await fetch(`${API_URL}/agendamentos/${id}`, {
                method: 'DELETE',
                headers: {
                    'barbearia-id': barbearia.id,
                    'Authorization': barbearia.token
                }
            });
            carregar();
        }

        carregar();
    </script>
</body>

</html>
