<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - AgendaPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fc;
            color: #1f2937;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            overflow-y: auto;
            transition: left 0.3s;
        }

        .logo-area {
            padding: 0 8px 24px 8px;
            border-bottom: 1px solid #f3f4f6;
            margin-bottom: 24px;
        }

        .logo-area h2 {
            font-size: 18px;
            font-weight: 700;
            color: #dc2626;
        }

        .logo-area p {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 4px;
        }

        .menu {
            flex: 1;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .menu-item:hover {
            background: #f3f4f6;
            color: #1f2937;
        }

        .menu-item.active {
            background: #fef2f2;
            color: #dc2626;
            font-weight: 600;
        }

        .user-box {
            padding: 12px;
            background: #f9fafb;
            border-radius: 10px;
            margin-top: auto;
        }

        .user-box-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: #dc2626;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        .user-info h4 {
            font-size: 13px;
            font-weight: 600;
        }

        .user-info p {
            font-size: 11px;
            color: #6b7280;
        }

        .btn-sair {
            width: 100%;
            padding: 8px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            cursor: pointer;
        }

        .btn-sair:hover {
            background: #f9fafb;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-menu {
            display: none;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
            color: #1f2937;
        }

        .topbar h1 {
            font-size: 20px;
            font-weight: 700;
        }

        .content-area {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
        }

        /* STATS */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #dc2626;
        }

        .stat-card div:last-child {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        /* SEARCH */
        .search-bar {
            margin-bottom: 16px;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #dc2626;
        }

        /* TABLE */
        .table-container {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #f3f4f6;
            font-size: 13px;
        }

        th {
            background: #f9fafb;
            font-weight: 600;
            color: #6b7280;
            font-size: 11px;
            text-transform: uppercase;
        }

        tr:hover td {
            background: #f9fafb;
        }

        .status-ativo {
            color: #059669;
            font-weight: 600;
            font-size: 12px;
        }

        .status-inativo {
            color: #dc2626;
            font-weight: 600;
            font-size: 12px;
        }

        .btn {
            padding: 5px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 2px;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-ativar {
            background: #10b981;
            color: white;
        }

        .btn-desativar {
            background: #ef4444;
            color: white;
        }

        .btn-dias {
            background: #f59e0b;
            color: white;
        }

        .btn-editar {
            background: #3b82f6;
            color: white;
        }

        .btn-excluir {
            background: #dc2626;
            color: white;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn:hover {
            opacity: 0.85;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            overflow: hidden;
        }

        .modal-header {
            background: #dc2626;
            color: white;
            padding: 16px 20px;
        }

        .modal-header h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .modal-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 12px;
            color: #374151;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            padding: 16px 20px;
            border-top: 1px solid #f3f4f6;
        }

        .btn-salvar {
            flex: 1;
            background: #10b981;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .btn-cancelar {
            flex: 1;
            background: #6b7280;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        /* LOGIN */
        .login-area {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 32px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #e5e7eb;
        }

        .login-area h2 {
            margin-bottom: 20px;
            color: #dc2626;
        }

        .login-area input {
            width: 100%;
            padding: 11px 14px;
            margin: 8px 0;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
        }

        .login-area button {
            width: 100%;
            padding: 11px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 8px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1100;
            font-size: 13px;
            font-weight: 600;
        }

        .toast.erro {
            background: #dc2626;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 998;
        }

        @media (max-width: 1024px) {
            .btn-menu {
                display: block;
            }

            .sidebar {
                position: fixed;
                left: -260px;
                top: 0;
                height: 100vh;
                z-index: 999;
            }

            .sidebar.show {
                left: 0;
            }

            .sidebar-overlay.show {
                display: block;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .content-area {
                padding: 16px;
            }

            .topbar {
                padding: 16px;
            }
        }

        @media (max-width: 768px) {

            th,
            td {
                font-size: 11px;
                padding: 8px;
            }

            .btn {
                padding: 4px 8px;
                font-size: 10px;
            }
        }
    </style>
</head>

<body>
    <div id="loginArea" class="login-area">
        <h2>👑 Área Administrativa</h2>
        <input type="text" id="adminUser" placeholder="Usuário" value="superadmin">
        <input type="password" id="adminPass" placeholder="Senha">
        <button onclick="loginAdmin()">Entrar</button>
    </div>

    <div id="adminPanel" style="display: none; width: 100%; height: 100vh;">
        <aside class="sidebar">
            <div class="logo-area">
                <h2>👑 AdminPro</h2>
                <p>Painel Super Admin</p>
            </div>

            <nav class="menu">
                <a class="menu-item active">
                    📊 Barbearias
                </a>
                <a class="menu-item" onclick="alert('Em breve')">
                    📈 Relatórios
                </a>
                <a class="menu-item" onclick="alert('Em breve')">
                    ⚙️ Configurações
                </a>
            </nav>

            <div class="user-box">
                <div class="user-box-top">
                    <div class="user-avatar">SA</div>
                    <div class="user-info">
                        <h4>Super Admin</h4>
                        <p>admin@agendapro.com</p>
                    </div>
                </div>
                <button class="btn-sair" onclick="logout()">Sair</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="topbar">
                <button class="btn-menu" onclick="toggleSidebar()">☰</button>
                <h1>Gerenciar Barbearias</h1>
            </div>

            <div class="content-area">
                <div class="stats" id="stats"></div>

                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="🔍 Buscar barbearia por nome ou email...">
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>Email</th>
                                <th>Plano</th>
                                <th>Expira em</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaBarbearias"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✏️ Editar Barbearia</h3>
            </div>
            <div class="modal-body">
                <div class="form-group"><label>Nome</label><input type="text" id="editNome"></div>
                <div class="form-group"><label>Email</label><input type="email" id="editEmail"></div>
                <div class="form-group"><label>Telefone</label><input type="text" id="editTelefone"></div>
                <div class="form-group"><label>CNPJ</label><input type="text" id="editCnpj"></div>
                <div class="form-group"><label>Nova Senha</label><input type="password" id="editSenha"
                        placeholder="Deixe em branco para manter"></div>
                <div class="form-group"><label>Plano</label>
                    <select id="editPlano">
                        <option value="trial">Trial</option>
                        <option value="mensal">Mensal</option>
                        <option value="trimestral">Trimestral</option>
                        <option value="anual">Anual</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button class="btn-salvar" onclick="salvarEdicao()">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let adminToken = null;
        let barbearias = [];
        let barbeariaEditando = null;

        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('show');
            let overlay = document.querySelector('.sidebar-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.className = 'sidebar-overlay';
                overlay.onclick = toggleSidebar;
                document.body.appendChild(overlay);
            }
            overlay.classList.toggle('show');
        }

        async function loginAdmin() {
            const username = document.getElementById('adminUser').value;
            const senha = document.getElementById('adminPass').value;

            try {
                const response = await fetch(`${API_URL}/api/login-admin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, senha })
                });

                const result = await response.json();
                if (response.ok) {
                    adminToken = result.token;
                    document.getElementById('loginArea').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'flex';
                    carregarBarbearias();
                } else {
                    alert('Acesso negado!');
                }
            } catch (error) {
                alert('Erro ao conectar');
            }
        }

        async function carregarBarbearias() {
            try {
                const response = await fetch(`${API_URL}/api/admin/barbearias`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                barbearias = await response.json();
                exibirBarbearias(barbearias);
                atualizarStats();
            } catch (error) {
                console.error('Erro:', error);
            }
        }

        function exibirBarbearias(lista) {
            const tbody = document.getElementById('tabelaBarbearias');
            tbody.innerHTML = lista.map(b => {
                const expiracao = new Date(b.data_expiracao);
                const statusClass = b.status === 'ativo' ? 'status-ativo' : 'status-inativo';
                const statusText = b.status === 'ativo' ? '🟢 Ativo' : '🔴 Inativo';
                const planoText = b.plano === 'trial' ? '🎁 Trial' : `💰 ${b.plano}`;

                return `<tr>
            <td>${b.id}</td>
            <td><strong>${b.nome || '-'}</strong></td>
            <td>${b.email || '-'}</td>
            <td>${planoText}</td>
            <td>${expiracao.toLocaleDateString()}</td>
            <td class="${statusClass}">${statusText}</td>
            <td>
                <button class="btn btn-editar" onclick="abrirModalEditar(${b.id})">✏️</button>
                <button class="btn btn-warning" onclick="resetarSenha(${b.id}, '${b.nome}')">🔑</button>
                <button class="btn btn-excluir" onclick="excluirBarbearia(${b.id})">🗑️</button>
                ${b.status === 'ativo' ?
                        `<button class="btn btn-desativar" onclick="alterarStatus(${b.id}, 'inativo')">Desativar</button>` :
                        `<button class="btn btn-ativar" onclick="alterarStatus(${b.id}, 'ativo')">Ativar</button>`
                    }
                <button class="btn btn-dias" onclick="adicionarDias(${b.id})">+7d</button>
            </td>
        </tr>`;
            }).join('');
        }

        function atualizarStats() {
            const total = barbearias.length;
            const ativas = barbearias.filter(b => b.status === 'ativo').length;
            const inativas = barbearias.filter(b => b.status === 'inativo').length;
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="stat-number">${total}</div><div>Total</div></div>
                <div class="stat-card"><div class="stat-number">${ativas}</div><div>Ativas</div></div>
                <div class="stat-card"><div class="stat-number">${inativas}</div><div>Inativas</div></div>
            `;
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase();
            const filtrados = barbearias.filter(b =>
                b.nome?.toLowerCase().includes(termo) ||
                b.email?.toLowerCase().includes(termo)
            );
            exibirBarbearias(filtrados);
        });

        async function abrirModalEditar(id) {
            try {
                const response = await fetch(`${API_URL}/api/admin/barbearias/${id}`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                barbeariaEditando = await response.json();

                document.getElementById('editNome').value = barbeariaEditando.nome || '';
                document.getElementById('editEmail').value = barbeariaEditando.email || '';
                document.getElementById('editTelefone').value = barbeariaEditando.telefone || '';
                document.getElementById('editCnpj').value = barbeariaEditando.cnpj || '';
                document.getElementById('editSenha').value = '';
                document.getElementById('editPlano').value = barbeariaEditando.plano || 'trial';

                document.getElementById('editModal').classList.add('show');
            } catch (error) {
                mostrarToast('Erro ao carregar dados', true);
            }
        }

        async function salvarEdicao() {
            const dados = {
                nome: document.getElementById('editNome').value,
                email: document.getElementById('editEmail').value,
                telefone: document.getElementById('editTelefone').value,
                cnpj: document.getElementById('editCnpj').value,
                senha: document.getElementById('editSenha').value,
                plano: document.getElementById('editPlano').value
            };

            try {
                const response = await fetch(`${API_URL}/api/admin/barbearias/${barbeariaEditando.id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify(dados)
                });

                const result = await response.json();
                if (response.ok) {
                    mostrarToast(result.mensagem);
                    fecharModal();
                    carregarBarbearias();
                } else {
                    mostrarToast(result.erro, true);
                }
            } catch (error) {
                mostrarToast('Erro ao salvar', true);
            }
        }

        async function excluirBarbearia(id) {
            if (confirm('Tem certeza que deseja excluir esta barbearia? Todas os dados serão perdidos!')) {
                try {
                    const response = await fetch(`${API_URL}/api/admin/barbearias/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${adminToken}` }
                    });
                    const result = await response.json();
                    if (response.ok) {
                        mostrarToast(result.mensagem);
                        carregarBarbearias();
                    } else {
                        mostrarToast(result.erro, true);
                    }
                } catch (error) {
                    mostrarToast('Erro ao excluir', true);
                }
            }
        }

        async function alterarStatus(id, status) {
            try {
                const response = await fetch(`${API_URL}/api/admin/barbearias/${id}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify({ status })
                });
                const result = await response.json();
                if (response.ok) {
                    mostrarToast(result.mensagem);
                    carregarBarbearias();
                } else {
                    mostrarToast(result.erro, true);
                }
            } catch (error) {
                mostrarToast('Erro ao alterar status', true);
            }
        }

        async function adicionarDias(id) {
            const dias = prompt('Quantos dias adicionar?', '7');
            if (dias && !isNaN(dias) && parseInt(dias) > 0) {
                try {
                    const response = await fetch(`${API_URL}/api/admin/barbearias/${id}/status`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${adminToken}`
                        },
                        body: JSON.stringify({ status: 'ativo', dias_extras: parseInt(dias) })
                    });
                    const result = await response.json();
                    if (response.ok) {
                        mostrarToast(`${dias} dias adicionados!`);
                        carregarBarbearias();
                    } else {
                        mostrarToast(result.erro, true);
                    }
                } catch (error) {
                    mostrarToast('Erro ao adicionar dias', true);
                }
            }
        }

        function fecharModal() {
            document.getElementById('editModal').classList.remove('show');
            barbeariaEditando = null;
        }

        function mostrarToast(msg, erro = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${erro ? 'erro' : ''}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function logout() {
            adminToken = null;
            document.getElementById('loginArea').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
        }

        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('editModal')) fecharModal();
        });

        async function resetarSenha(id, nome) {
            if (!confirm(`Resetar a senha de ${nome}? A senha nova vai aparecer na tela.`)) return;

            try {
                const response = await fetch(`${API_URL}/api/admin/barbearias/${id}/reset-senha`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.erro);

                alert(`Nova senha de ${nome}:\n\n${data.novaSenha}\n\nCopia e guarda aí. Ela só aparece uma vez.`);
                mostrarToast('Senha resetada');
            } catch (error) {
                mostrarToast('Erro: ' + error.message, true);
            }
        }
    </script>
</body>

</html>
