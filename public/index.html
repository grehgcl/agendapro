<!DOCTYPE html>
<html lang="pt">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgendaPro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .links a {
            display: block;
            margin: 15px 0;
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: transform 0.2s;
        }

        .links a:hover {
            transform: translateY(-2px);
        }

        .logo {
            font-size: 3em;
            margin-bottom: 20px;
        }
    </style>
</head>

        <div class="logo">📋</div>
