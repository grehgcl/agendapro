<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços - AgendaPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/tabela.css">
</head>

<body>
    <main class="main-content">
        <div class="topbar">
            <div class="topbar-left">
                <button class="btn-menu" onclick="toggleSidebar()">☰</button>
                <h1>Meus Serviços</h1>
            </div>
            <div class="topbar-actions">
                <button class="btn-primary" id="btnNovoServico">
                    + Novo Serviço
                </button>
            </div>
        </div>

        <div class="content-area">
            <div class="table-container">
                <table id="tabelaServicos">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Preço</th>
                            <th>Duração</th>
                            <th>Descrição</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaServicos">
                        <tr>
                            <td colspan="5" style="text-align: center; color: #9ca3af; padding: 40px;">
                                <div class="loading">
                                    <div class="spinner"></div>
                                    <p>Carregando...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modalServico" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">➕ Novo Serviço</h3>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Nome do Serviço *</label>
                    <input type="text" id="servicoNome" placeholder="Ex: Corte de Cabelo, Limpeza de Pele...">
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="servicoDescricao" placeholder="Detalhes do serviço..."></textarea>
                </div>
                <div class="form-group">
                    <label>Preço * (R$)</label>
                    <input type="number" id="servicoPreco" step="0.01" placeholder="0,00">
                </div>
                <div class="form-group">
                    <label>Duração (minutos)</label>
                    <select id="servicoDuracao">
                        <option value="15">15 minutos</option>
                        <option value="30" selected>30 minutos</option>
                        <option value="45">45 minutos</option>
                        <option value="60">1 hora</option>
                        <option value="90">1 hora e 30 minutos</option>
                        <option value="120">2 horas</option>
                        <option value="180">3 horas</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button class="btn-salvar" onclick="salvarServico()">Salvar</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS: SÓ UMA VEZ E NO FINAL DO BODY -->
    <script src="/js/core/auth.js"></script>
    <script src="/js/core/api.js"></script>
    <script src="/js/components/sidebar.js"></script>
    <script src="/js/pages/servicos.js"></script>
</body>

</html>
